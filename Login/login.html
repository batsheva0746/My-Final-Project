<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה למערכת</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="./login.css" rel="stylesheet">
    <link href="../Image/user.jpg" rel="icon">
</head>
<body>
    <div id="details">
        <h2 class="title">התחברות למערכת</h2>
        <input id="nameCheck" type="text" placeholder="שם משתמש" required>
        
        <div class="password-wrapper">
            <input id="passwordCheck" type="password" placeholder="סיסמא" required>
            <button type="button" id="togglePasswordBtn" onclick="togglePasswordVisibility('passwordCheck', 'eyeIcon')" aria-label="הצג/הסתר סיסמה">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
            </button>
        </div>

        <p id="loginError" class="error-msg"></p>
        <button id="start" onclick="login()">כניסה</button>
    </div>
    <script src="./Login.js"></script>
</body>
</html>
